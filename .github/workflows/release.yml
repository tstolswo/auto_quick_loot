name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew build

      - name: Locate built JAR
        id: jar
        run: |
          # Find the reobfuscated JAR, excluding dev/sources jars
          JAR=$(find build/libs -name "autoquickloot-*.jar" \
                ! -name "*-sources*" \
                ! -name "*-dev*" \
                ! -name "*-slim*" \
                | sort | tail -1)
          echo "JAR_PATH=$JAR" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          generate_release_notes: true   # auto-generates notes from commits since last tag
          files: ${{ steps.jar.outputs.JAR_PATH }}
          draft: false
          prerelease: false
